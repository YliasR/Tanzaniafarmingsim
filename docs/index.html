<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanzania Farm Sim</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Landing overlay -->
<div id="info-overlay">
  <div class="info-card">
    <h1>FARM SIM</h1>
    <p>
      A low-poly Tanzanian farming world. Tend your crops, raise animals,
      and survive on the savanna.
    </p>
    <p style="font-size:13px; color:#666;">
      Drag to orbit &bull; Scroll to zoom
    </p>
    <div class="start-hint">[ CLICK TO ENTER ]</div>
  </div>
</div>

<div id="canvas-container">
  <!-- HUD -->
  <div id="hud">
    <h1>FARM SIM</h1>
  </div>

  <!-- Nokia phone (logic preserved for later use) -->
  <div id="nokia-container" onclick="toggleNokia()">
    <div class="nokia-phone">
      <div class="nokia-brand">NOKIA</div>
      <div class="nokia-screen" id="nokia-screen">
        <div class="sms-text" id="nokia-text">No new messages</div>
      </div>
      <div class="nokia-nav">
        <div class="nokia-nav-btn"></div>
        <div class="nokia-nav-center"></div>
        <div class="nokia-nav-btn"></div>
      </div>
      <div class="nokia-keypad">
        <div class="nokia-key">1</div><div class="nokia-key">2</div><div class="nokia-key">3</div>
        <div class="nokia-key">4</div><div class="nokia-key">5</div><div class="nokia-key">6</div>
        <div class="nokia-key">7</div><div class="nokia-key">8</div><div class="nokia-key">9</div>
        <div class="nokia-key">*</div><div class="nokia-key">0</div><div class="nokia-key">#</div>
      </div>
      <div class="nokia-hint" id="nokia-hint">TAP TO READ SMS</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="scene.js"></script>
<script src="controls.js"></script>
<script src="sms.js"></script>
<script src="app.js"></script>
</body>
</html>
